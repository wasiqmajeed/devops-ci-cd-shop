<!DOCTYPE html>
<html>
<head>
    <title>Mini Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">Marketplace Listings</h1>
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="text-success fw-bold">${{ product.price }}</p>
                        <a href="{{ url_for('product_detail', id=product.id) }}" class="btn btn-primary">View Item</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        <hr>
        <a href="/add_sample" class="btn btn-outline-secondary btn-sm">Click here to add sample items</a>
    </div>
</body>
</html>
